<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Capability card</div>
  <div style="width:280px;background:#181818;border:1px solid var(--hairline);border-radius:6px;overflow:hidden">
    <div style="position:relative;aspect-ratio:16/10;background:linear-gradient(135deg,#1a3a2e 0%,#0f1f1a 50%,#1f3a4a 100%);filter:contrast(1.1) brightness(0.7)">
      <div style="position:absolute;left:10px;bottom:10px;background:rgba(10,10,11,.72);backdrop-filter:blur(6px);border:1px solid var(--hairline);border-radius:3px;padding:3px 7px"><span class="mono" style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.85)">video-to-video</span></div>
    </div>
    <div style="padding:14px 16px 12px">
      <div style="font-size:14px;font-weight:600;letter-spacing:-0.01em;margin-bottom:3px">daydream/video-v2</div>
      <div style="font-size:12px;color:rgba(255,255,255,.55);line-height:1.4">Real-time scene-conditioned generation</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--hairline)">
      <div style="padding:10px 14px;border-right:1px solid var(--hairline)"><div class="eyebrow" style="font-size:9.5px;margin-bottom:3px">P50</div><div class="mono" style="font-size:12px">412<span style="color:rgba(255,255,255,.5)">ms</span></div></div>
      <div style="padding:10px 14px;border-right:1px solid var(--hairline)"><div class="eyebrow" style="font-size:9.5px;margin-bottom:3px">PRICE</div><div class="mono" style="font-size:12px">$0.005<span style="color:rgba(255,255,255,.5)">/min</span></div></div>
      <div style="padding:10px 14px"><div class="eyebrow" style="font-size:9.5px;margin-bottom:3px">7D</div><div class="mono" style="font-size:12px">1.2K</div></div>
    </div>
  </div>
</div></body></html>
