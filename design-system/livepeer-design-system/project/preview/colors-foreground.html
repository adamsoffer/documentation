<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Foreground hierarchy · opacity over canvas</div>
  <div class="col" style="gap:6px">
    <div style="display:flex;align-items:baseline;gap:14px"><span style="color:rgba(255,255,255,1);font-weight:600;font-size:15px;width:140px">Heading</span><span class="hex">fg · 100%</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="color:rgba(255,255,255,.7);font-size:13.5px;width:140px">Strong body text</span><span class="hex">fg-strong · 70%</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="color:rgba(255,255,255,.6);font-size:13.5px;width:140px">Body text</span><span class="hex">fg-muted · 60%</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="color:rgba(255,255,255,.5);font-size:13.5px;width:140px">Supporting</span><span class="hex">fg-faint · 50%</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="color:rgba(255,255,255,.4);font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;width:140px">Eyebrow / label</span><span class="hex">fg-label · 40%</span></div>
    <div style="display:flex;align-items:baseline;gap:14px"><span style="color:rgba(255,255,255,.25);font-size:13.5px;width:140px">Disabled</span><span class="hex">fg-disabled · 25%</span></div>
  </div>
</div></body></html>
