<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:10px">Reserved for liveness/activity — never decorative</div>
  <div class="row" style="gap:18px">
    <div class="swatch"><div class="chip" style="background:#F59E0B"></div><div class="label">warm</div><div class="hex">#F59E0B</div></div>
    <div class="swatch"><div class="chip" style="background:#FBBF24"></div><div class="label">warm-bright</div><div class="hex">#FBBF24</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(245,158,11,0.12);border-color:var(--subtle-line)"></div><div class="label">warm-subtle</div><div class="hex">12%</div></div>
    <div class="swatch"><div class="chip" style="background:#F87171"></div><div class="label">red-400</div><div class="hex">#F87171</div></div>
  </div>
</div></body></html>
