<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Iconography · Lucide · stroke 1.5</div>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:18px;text-align:center">
    <div><i data-lucide="home" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">home</div></div>
    <div><i data-lucide="search" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">search</div></div>
    <div><i data-lucide="globe" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">globe</div></div>
    <div><i data-lucide="bar-chart-3" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">usage</div></div>
    <div><i data-lucide="key-round" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">keys</div></div>
    <div><i data-lucide="settings" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">settings</div></div>
    <div><i data-lucide="play" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">play</div></div>
    <div><i data-lucide="zap" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">zap</div></div>
    <div><i data-lucide="activity" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">activity</div></div>
    <div><i data-lucide="cpu" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">cpu</div></div>
    <div><i data-lucide="terminal" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">terminal</div></div>
    <div><i data-lucide="copy" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">copy</div></div>
    <div><i data-lucide="external-link" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">external</div></div>
    <div><i data-lucide="check" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">check</div></div>
    <div><i data-lucide="x" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">x</div></div>
    <div><i data-lucide="chevron-down" style="color:rgba(255,255,255,.85)"></i><div class="hex" style="margin-top:6px">chevron</div></div>
  </div>
  <script>lucide.createIcons({attrs:{"stroke-width":1.5,width:20,height:20}})</script>
</div></body></html>
