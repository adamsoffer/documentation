<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:18px">
    <div class="swatch"><div class="chip" style="background:#18794E"></div><div class="label">green</div><div class="hex">#18794E</div></div>
    <div class="swatch"><div class="chip" style="background:#1E9960"></div><div class="label">green-light</div><div class="hex">#1E9960</div></div>
    <div class="swatch"><div class="chip" style="background:#115C3B"></div><div class="label">green-dark</div><div class="hex">#115C3B</div></div>
    <div class="swatch"><div class="chip" style="background:#40BF86"></div><div class="label">green-bright</div><div class="hex">#40BF86</div></div>
    <div class="swatch"><div class="chip" style="background:rgba(24,121,78,0.15);border-color:var(--subtle-line)"></div><div class="label">green-subtle</div><div class="hex">15% green</div></div>
  </div>
</div></body></html>
