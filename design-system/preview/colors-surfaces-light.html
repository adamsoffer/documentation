<!doctype html><html><head><meta charset="utf-8" data-theme="light"><link rel="stylesheet" href="_card.css"><style>html{background:#FAFAFA;color:rgb(24,24,27)}.label{color:rgba(24,24,27,.85)}.hex{color:rgba(24,24,27,.5)}.chip{border-color:rgba(24,24,27,.10)}</style></head><body>

    <div class="swatch"><div class="chip" style="background:#F4F4F5"></div><div class="label">bg-card</div><div class="hex">zinc-100</div></div>
    <div class="swatch"><div class="chip" style="background:#E4E4E7"></div><div class="label">border</div><div class="hex">zinc-200</div></div>
  </div>
</div></body></html>
