<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Form controls · input · select · search · with focus</div>
  <div class="col" style="gap:12px;max-width:380px">
    <div style="position:relative">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4)"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input placeholder="Search capabilities, runs, keys" style="width:100%;height:32px;padding:0 12px 0 32px;background:rgba(255,255,255,.04);border:1px solid var(--hairline);border-radius:8px;color:rgba(255,255,255,.85);font-family:var(--font-sans);font-size:13px;letter-spacing:-0.005em;outline:none">
      <kbd class="mono" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;background:rgba(255,255,255,.06);border:1px solid var(--subtle-line);border-radius:3px;padding:1px 5px;color:rgba(255,255,255,.5)">⌘K</kbd>
    </div>
    <input value="adam@flipbook.studio" style="height:32px;padding:0 12px;background:rgba(255,255,255,.03);border:1px solid rgba(64,191,134,.30);box-shadow:0 0 0 1px rgba(64,191,134,.15);border-radius:6px;color:rgba(255,255,255,.9);font-family:var(--font-sans);font-size:13px;outline:none">
    <select style="height:32px;padding:0 12px;background:rgba(255,255,255,.04);border:1px solid var(--hairline);border-radius:6px;color:rgba(255,255,255,.85);font-family:var(--font-sans);font-size:13px;appearance:none">
      <option>Production · Flipbook</option>
    </select>
    <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.85)"><span style="width:30px;height:18px;background:#18794E;border-radius:9999px;position:relative"><span style="position:absolute;top:2px;left:14px;width:14px;height:14px;background:#fff;border-radius:50%"></span></span>Notify on failed runs</label>
  </div>
</div></body></html>
