<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Sidebar nav · collapsed + expanded rail</div>
  <div style="display:flex;gap:18px;align-items:flex-start">
    <div style="width:232px;background:#070707;border:1px solid var(--hairline);border-radius:6px;padding:12px 8px">
      <div style="display:flex;align-items:center;gap:10px;padding:6px 10px 14px;border-bottom:1px solid var(--hairline);margin-bottom:10px">
        <img src="../assets/livepeer-symbol-white.svg" alt="" style="height:18px;width:auto">
        <img src="../assets/livepeer-wordmark-white.svg" alt="Livepeer" style="height:11px;width:auto">
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:4px;background:rgba(255,255,255,.06);font-size:13px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#fff"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
        <span style="color:#fff">Home</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:4px;font-size:13px;color:rgba(255,255,255,.6)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        Explore
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:4px;font-size:13px;color:rgba(255,255,255,.6)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
        Network
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:4px;font-size:13px;color:rgba(255,255,255,.6)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        Usage
      </div>
    </div>
    <div style="width:56px;background:#070707;border:1px solid var(--hairline);border-radius:6px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="width:40px;height:36px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--hairline);margin-bottom:4px"><img src="../assets/livepeer-symbol-white.svg" alt="" style="height:18px;width:auto"></div>
      <div style="width:40px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border-radius:4px;color:#fff"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg></div>
      <div style="width:40px;height:30px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></div>
      <div style="width:40px;height:30px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/></svg></div>
    </div>
  </div>
</div></body></html>
