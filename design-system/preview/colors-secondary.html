<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:18px">
    <div class="swatch"><div class="chip" style="background:#146A8F"></div><div class="label">blue</div><div class="hex">#146A8F</div></div>
    <div class="swatch"><div class="chip" style="background:#1380AE"></div><div class="label">blue-light</div><div class="hex">#1380AE</div></div>
    <div class="swatch"><div class="chip" style="background:#145571"></div><div class="label">blue-dark</div><div class="hex">#145571</div></div>
    <div class="swatch"><div class="chip" style="background:#25ABD0"></div><div class="label">blue-bright</div><div class="hex">#25ABD0</div></div>
    <div class="swatch"><div class="chip" style="background:#7C3AED"></div><div class="label">purple</div><div class="hex">#7C3AED</div></div>
    <div class="swatch"><div class="chip" style="background:#A78BFA"></div><div class="label">purple-bright</div><div class="hex">#A78BFA</div></div>
  </div>
</div></body></html>
