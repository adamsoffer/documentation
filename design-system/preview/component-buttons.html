<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Buttons · primary · ghost · icon · with kbd</div>
  <div class="row" style="gap:14px;align-items:center">
    <button style="height:32px;padding:0 14px;border-radius:4px;background:#18794E;color:#fff;border:1px solid rgba(64,191,134,.25);font-family:var(--font-sans);font-size:13px;font-weight:500;letter-spacing:-0.005em;cursor:pointer;display:inline-flex;align-items:center;gap:10px">Open in playground <kbd class="mono" style="font-size:10px;background:rgba(255,255,255,.18);border-radius:2px;padding:1px 5px">R</kbd></button>
    <button style="height:32px;padding:0 14px;border-radius:4px;background:transparent;color:rgba(255,255,255,.7);border:1px solid var(--hairline);font-family:var(--font-sans);font-size:13px;font-weight:500;cursor:pointer">Cancel</button>
    <button style="height:26px;width:26px;border-radius:4px;background:transparent;border:1px solid var(--hairline);color:rgba(255,255,255,.5);cursor:pointer;display:inline-flex;align-items:center;justify-content:center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button style="height:36px;padding:0 18px;border-radius:4px;background:#18794E;color:#fff;border:1px solid rgba(64,191,134,.30);font-family:var(--font-sans);font-size:13.5px;font-weight:500;cursor:pointer;box-shadow:0 0 24px -6px rgba(64,191,134,.45)">Get started</button>
  </div>
</div></body></html>
