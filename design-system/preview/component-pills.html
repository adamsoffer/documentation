<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes statusHalo{0%{transform:scale(1);opacity:.6}80%,100%{transform:scale(2.4);opacity:0}}
.dot{position:relative;width:8px;height:8px;border-radius:50%;display:inline-block}
.dot::after{content:"";position:absolute;inset:0;border-radius:50%;background:inherit;animation:statusHalo 1.8s ease-out infinite}
</style></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Pills + status</div>
  <div class="row" style="gap:10px;align-items:center;margin-bottom:18px">
    <span class="mono" style="font-size:10.5px;text-transform:lowercase;color:#40BF86;background:rgba(24,121,78,.15);border:1px solid rgba(64,191,134,.25);border-radius:3px;padding:2px 7px;display:inline-flex;align-items:center;gap:5px"><span style="width:5px;height:5px;border-radius:50%;background:#40BF86;animation:breathe 2.4s ease-in-out infinite"></span>live</span>
    <span class="mono" style="font-size:10.5px;text-transform:lowercase;color:#FBBF24;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);border-radius:3px;padding:2px 7px">warm</span>
    <span class="mono" style="font-size:10.5px;text-transform:lowercase;color:rgba(255,255,255,.5);background:rgba(255,255,255,.04);border:1px solid var(--hairline);border-radius:3px;padding:2px 7px">cold</span>
    <span class="mono" style="font-size:10.5px;text-transform:lowercase;color:rgba(255,255,255,.7);background:rgba(255,255,255,.06);border:1px solid var(--subtle-line);border-radius:3px;padding:2px 7px">queued</span>
    <span class="mono" style="font-size:10.5px;text-transform:lowercase;color:#F87171;background:rgba(248,113,113,.10);border:1px solid rgba(248,113,113,.25);border-radius:3px;padding:2px 7px">fail</span>
  </div>
  <div class="row" style="gap:18px;align-items:center">
    <div style="display:inline-flex;align-items:center;gap:8px"><span class="dot" style="background:#40BF86"></span><span class="mono" style="font-size:11px;color:rgba(255,255,255,.7)">all systems operational</span></div>
    <div style="display:inline-flex;align-items:center;gap:8px"><span class="dot" style="background:#FBBF24"></span><span class="mono" style="font-size:11px;color:rgba(255,255,255,.7)">degraded</span></div>
    <div style="display:inline-flex;align-items:center;gap:8px"><span class="dot" style="background:#25ABD0"></span><span class="mono" style="font-size:11px;color:rgba(255,255,255,.7)">syncing</span></div>
  </div>
</div></body></html>
