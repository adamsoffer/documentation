<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">KPI strip · 4-up</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--hairline);border:1px solid var(--hairline);border-radius:6px;overflow:hidden">
    <div style="background:#181818;padding:18px 20px"><div class="eyebrow" style="margin-bottom:6px">RUNS · MTD</div><div class="mono" style="font-size:24px;font-weight:600;letter-spacing:-0.02em">17,374</div><div class="mono" style="font-size:11px;color:#40BF86;margin-top:4px">+18.2%</div></div>
    <div style="background:#181818;padding:18px 20px"><div class="eyebrow" style="margin-bottom:6px">SPEND · MTD</div><div class="mono" style="font-size:24px;font-weight:600;letter-spacing:-0.02em">$5.70</div><div class="mono" style="font-size:11px;color:rgba(255,255,255,.5);margin-top:4px">of $50 cap</div></div>
    <div style="background:#181818;padding:18px 20px"><div class="eyebrow" style="margin-bottom:6px">P50 LATENCY</div><div class="mono" style="font-size:24px;font-weight:600;letter-spacing:-0.02em">284<span style="font-size:14px;color:rgba(255,255,255,.5);font-weight:400">ms</span></div><div class="mono" style="font-size:11px;color:#40BF86;margin-top:4px">−12ms</div></div>
    <div style="background:#181818;padding:18px 20px"><div class="eyebrow" style="margin-bottom:6px">SUCCESS</div><div class="mono" style="font-size:24px;font-weight:600;letter-spacing:-0.02em">99.4<span style="font-size:14px;color:rgba(255,255,255,.5);font-weight:400">%</span></div><div class="mono" style="font-size:11px;color:#F87171;margin-top:4px">−0.2pp</div></div>
  </div>
</div></body></html>
