<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <pattern id="pl-dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="0.6" fill="#1a3a2a"/>
    </pattern>
    <radialGradient id="pl-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0e1d15"/>
      <stop offset="100%" stop-color="#070d0a"/>
    </radialGradient>
  </defs>
  <rect width="400" height="240" fill="url(#pl-bg)"/>
  <rect width="400" height="240" fill="url(#pl-dots)"/>

  <!-- Input frames streaming in -->
  <g stroke="#40BF86" stroke-width="2" stroke-linejoin="round">
    <rect x="20" y="105" width="32" height="28" rx="3" fill="#40BF86" fill-opacity="0.08"/>
    <rect x="56" y="105" width="32" height="28" rx="3" fill="#40BF86" fill-opacity="0.14"/>
    <rect x="92" y="105" width="32" height="28" rx="3" fill="#40BF86" fill-opacity="0.20"/>
  </g>

  <!-- Arrow into pipeline -->
  <g stroke="#40BF86" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="130" y1="119" x2="158" y2="119"/>
    <path d="M 152 113 L 160 119 L 152 125"/>
  </g>

  <!-- Processing pipeline block -->
  <g stroke="#40BF86" stroke-width="2" stroke-linejoin="round">
    <rect x="164" y="82" width="78" height="74" rx="6" fill="#40BF86" fill-opacity="0.14"/>
  </g>
  <!-- Internal stage segments suggesting multi-step processing -->
  <g stroke="#40BF86" stroke-linecap="round" fill="none">
    <line x1="178" y1="103" x2="222" y2="103" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="178" y1="120" x2="228" y2="120" stroke-opacity="0.85" stroke-width="2.4"/>
    <line x1="178" y1="137" x2="218" y2="137" stroke-opacity="0.5" stroke-width="2"/>
  </g>

  <!-- Arrow out of pipeline -->
  <g stroke="#40BF86" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="248" y1="119" x2="276" y2="119"/>
    <path d="M 270 113 L 278 119 L 270 125"/>
  </g>

  <!-- Output frames streaming out -->
  <g stroke="#40BF86" stroke-width="2" stroke-linejoin="round">
    <rect x="282" y="105" width="32" height="28" rx="3" fill="#40BF86" fill-opacity="0.20"/>
    <rect x="318" y="105" width="32" height="28" rx="3" fill="#40BF86" fill-opacity="0.14"/>
    <rect x="354" y="105" width="32" height="28" rx="3" fill="#40BF86" fill-opacity="0.08"/>
  </g>
</svg>
